#spring.config.import=optional:file:.env[.properties]
spring.config.import=optional:file:D:/springBoot/transactionservice/transactionservice/application-env.properties


spring.application.name=transaction-service
server.port=8082

# PostgreSQL Database Connection
spring.datasource.url=${DB_URL_TRANSACTION}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#EUREKA Discover
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


#kafka config
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


spring.kafka.producer.properties.spring.json.add.type=true

#Jwt Config
jwt.secret=${JWT_SECRETE}

























