spring.config.import=optional:file:D:/springBoot/notificationservice/notificationservice/application-env.properties

spring.application.name=notification-service
server.port=8083

# PostgreSQL Database Connection
spring.datasource.url=${DB_URL_NOTIFICATION}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


#KAFKA CONFIG AS CONSUMER
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group

#when the service is down and up again events that came in when it was down will be processed
spring.kafka.consumer.auto-offset-reset=earliest


spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.type.mapping=\
  com.example.usersaccountservice.kafka.dto.UserRegistrationEvent:com.example.notificationservice.kafka.dto.UserRegistrationEvent,\
  com.example.usersaccountservice.kafka.dto.BalanceUpdateEvent:com.example.notificationservice.kafka.dto.BalanceUpdateEvent


#SMTP EMAIL CONFIG
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.password=${EMAIL_APP_PASSWORD}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



# Actuator Config, Health Monitoring
management.endpoints.web.exposure.include=*


#EUREKA Discover
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/