name: USER Account Service CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- STAGE 1: VALIDATION (Runs on Push to dev/master AND on PR to master) ---
  build-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'
      - name: Build with Maven
        working-directory: usersaccountservice/usersaccountservice
        run: mvn clean package -DskipTests

  # --- STAGE 2: DEPLOYMENT (Only runs on PUSH/MERGE to master) ---
  deploy:
    needs: build-verification
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /home/ec2-user/projects/CoreBankX-Event-Driven-Banking-Platform/usersaccountservice/usersaccountservice
            git pull origin main
            cd /home/ec2-user/projects
            docker-compose up -d --build user-account-service
            docker image prune -f