#spring.config.import=optional:file:.env[.properties]
spring.config.import=optional:file:D:/springBoot/usersaccountservice/usersaccountservice/application-env.properties



spring.application.name=user-account-service
server.port=8081

# PostgreSQL Database Connection
spring.datasource.url=${DB_URL_ACCOUNT}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Jwt Config
jwt.secret=${JWT_SECRETE}
jwt.expiration=${JWT_EXPIRATION}

#Actuator Config , Health Monitoring
management.endpoints.web.exposure.include=*

#Eureka Discovery Config => By default we have port 8761 so it is going to pick
eureka.client.server-url.defaultZone=http://localhost:8761/eureka/


#kafka config
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


spring.kafka.producer.properties.spring.json.add.type=true


#KAFKA CONFIG AS CONSUMER
spring.kafka.consumer.group-id=account-group

#when the service is down and up again events that came in when it was down will be processed
spring.kafka.consumer.auto-offset-reset=earliest


spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.type.mapping=\
  com.example.transactionservice.kafka.dto.BalanceUpdateEvent:com.example.usersaccountservice.kafka.dto.BalanceUpdateEvent














